<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Horloge Mondiale — World Clock</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.0.0/tabler-icons.min.css">
  <style>
    *, *::before, *::after { 
      box-sizing: border-box; 
      margin: 0; 
      padding: 0; 
    }

    :root {
      --bg: #0f0f0f;
      --surface: #1a1a1a;
      --surface2: #252525;
      --border: rgba(255,255,255,0.1);
      --text: #ffffff;
      --text2: #b0b0b0;
      --accent: #00d4ff;
      --accent2: #ff006e;
      --accent3: #8338ec;
    }

    body {
      font-family: 'Courier New', monospace;
      background: linear-gradient(135deg, #0f0f0f 0%, #1a1a1a 100%);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
      overflow: hidden;
    }

    .stars {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
    }

    .star {
      position: absolute;
      width: 2px;
      height: 2px;
      background: white;
      border-radius: 50%;
      animation: twinkle 3s infinite;
    }

    @keyframes twinkle {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 1; }
    }

    header {
      text-align: center;
      margin-bottom: 3rem;
      z-index: 10;
      position: relative;
    }

    header h1 {
      font-size: 2.5rem;
      font-weight: 700;
      letter-spacing: 3px;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 8px;
      text-transform: uppercase;
    }

    header p {
      font-size: 14px;
      color: var(--text2);
      letter-spacing: 2px;
    }

    .container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 2rem;
      max-width: 1400px;
      width: 100%;
      z-index: 10;
      position: relative;
    }

    .clock-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 2rem;
      text-align: center;
      backdrop-filter: blur(10px);
      transition: all 0.3s ease;
      box-shadow: 0 8px 32px rgba(0, 212, 255, 0.1);
    }

    .clock-card:hover {
      transform: translateY(-10px);
      border-color: var(--accent);
      box-shadow: 0 16px 48px rgba(0, 212, 255, 0.2);
    }

    .city-name {
      font-size: 18px;
      font-weight: 600;
      color: var(--accent);
      margin-bottom: 12px;
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    .timezone-info {
      font-size: 12px;
      color: var(--text2);
      margin-bottom: 20px;
      letter-spacing: 1px;
    }

    .time-display {
      font-size: 3.5rem;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 12px;
      font-variant-numeric: tabular-nums;
      text-shadow: 0 0 20px rgba(0, 212, 255, 0.5);
      letter-spacing: 4px;
    }

    .period {
      font-size: 1.2rem;
      color: var(--accent2);
      margin-bottom: 16px;
      font-weight: 600;
      letter-spacing: 1px;
    }

    .date-display {
      font-size: 13px;
      color: var(--text2);
      margin-bottom: 12px;
      letter-spacing: 1px;
    }

    .day-display {
      font-size: 12px;
      color: var(--accent3);
      font-weight: 500;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .emoji {
      font-size: 2rem;
      margin-bottom: 12px;
      display: block;
      filter: drop-shadow(0 0 8px rgba(0, 212, 255, 0.3));
    }

    .controls {
      margin-top: 3rem;
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
      z-index: 10;
      position: relative;
    }

    button {
      padding: 12px 24px;
      font-size: 14px;
      font-weight: 600;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.3s ease;
      font-family: 'Courier New', monospace;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .btn-primary {
      background: linear-gradient(90deg, var(--accent), #00a8cc);
      color: #000;
      box-shadow: 0 4px 15px rgba(0, 212, 255, 0.3);
    }

    .btn-primary:hover {
      transform: scale(1.05);
      box-shadow: 0 8px 25px rgba(0, 212, 255, 0.5);
    }

    .btn-secondary {
      background: var(--surface2);
      color: var(--text);
      border: 1px solid var(--border);
    }

    .btn-secondary:hover {
      border-color: var(--accent);
      background: var(--surface2);
      box-shadow: 0 0 15px rgba(0, 212, 255, 0.2);
    }

    .format-toggle {
      display: flex;
      gap: 8px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 4px;
    }

    .format-btn {
      padding: 8px 16px;
      font-size: 12px;
      border: none;
      border-radius: 6px;
      background: transparent;
      color: var(--text2);
      cursor: pointer;
      transition: all 0.2s;
      letter-spacing: 1px;
    }

    .format-btn.active {
      background: var(--accent);
      color: #000;
      font-weight: 600;
    }

    footer {
      margin-top: 4rem;
      font-size: 12px;
      color: var(--text2);
      text-align: center;
      z-index: 10;
      position: relative;
      letter-spacing: 1px;
    }

    @media (max-width: 768px) {
      header h1 { font-size: 1.8rem; }
      .time-display { font-size: 2.5rem; }
      .container { gap: 1.5rem; }
    }
  </style>
</head>
<body>

  <div class="stars" id="stars"></div>

  <header>
    <h1>⏰ WORLD CLOCK</h1>
    <p>Heure mondiale en temps réel</p>
  </header>

  <div class="controls">
    <div class="format-toggle">
      <button class="format-btn active" onclick="setFormat('24h')">24H</button>
      <button class="format-btn" onclick="setFormat('12h')">12H</button>
    </div>
  </div>

  <div class="container" id="container"></div>

  <div class="controls">
    <button class="btn-secondary" onclick="addTimezone()">
      <i class="ti ti-plus"></i> Ajouter fuseau horaire
    </button>
    <button class="btn-secondary" onclick="resetTimezones()">
      <i class="ti ti-refresh"></i> Réinitialiser
    </button>
  </div>

  <footer>
    ⚡ Mise à jour en temps réel | Créé avec Claude AI
  </footer>

<script>
  let format24h = true;
  let timezones = [
    { city: 'Paris', tz: 'Europe/Paris', emoji: '🇫🇷' },
    { city: 'New York', tz: 'America/New_York', emoji: '🗽' },
    { city: 'Tokyo', tz: 'Asia/Tokyo', emoji: '🗾' },
    { city: 'Sydney', tz: 'Australia/Sydney', emoji: '🦘' },
    { city: 'Dubai', tz: 'Asia/Dubai', emoji: '🏜️' },
    { city: 'Londres', tz: 'Europe/London', emoji: '🇬🇧' },
    { city: 'Los Angeles', tz: 'America/Los_Angeles', emoji: '🌴' },
    { city: 'Singapour', tz: 'Asia/Singapore', emoji: '🇸🇬' },
    { city: 'Mumbai', tz: 'Asia/Kolkata', emoji: '🇮🇳' },
    { city: 'Toronto', tz: 'America/Toronto', emoji: '🍁' },
    { city: 'Moscou', tz: 'Europe/Moscow', emoji: '🇷🇺' },
    { city: 'Bangkok', tz: 'Asia/Bangkok', emoji: '🇹🇭' }
  ];

  function createStars() {
    const starsContainer = document.getElementById('stars');
    for (let i = 0; i < 50; i++) {
      const star = document.createElement('div');
      star.className = 'star';
      star.style.left = Math.random() * 100 + '%';
      star.style.top = Math.random() * 100 + '%';
      star.style.animationDelay = Math.random() * 3 + 's';
      starsContainer.appendChild(star);
    }
  }

  function formatTime(date, use24h) {
    const hours = String(date.getHours()).padStart(2, '0');
    const minutes = String(date.getMinutes()).padStart(2, '0');
    const seconds = String(date.getSeconds()).padStart(2, '0');

    if (use24h) {
      return `${hours}:${minutes}:${seconds}`;
    } else {
      let h = date.getHours();
      const period = h >= 12 ? 'PM' : 'AM';
      h = h % 12 || 12;
      return `${String(h).padStart(2, '0')}:${minutes}:${seconds} ${period}`;
    }
  }

  function getTimeInTimezone(tz) {
    try {
      const formatter = new Intl.DateTimeFormat('en-US', {
        timeZone: tz,
        year: 'numeric',
        month: '2-digit',
        day: '2-digit',
        hour: '2-digit',
        minute: '2-digit',
        second: '2-digit',
        hour12: false
      });

      const parts = formatter.formatToParts(new Date());
      const year = parts.find(p => p.type === 'year').value;
      const month = parts.find(p => p.type === 'month').value;
      const day = parts.find(p => p.type === 'day').value;
      const hour = parts.find(p => p.type === 'hour').value;
      const minute = parts.find(p => p.type === 'minute').value;
      const second = parts.find(p => p.type === 'second').value;

      return new Date(`${year}-${month}-${day}T${hour}:${minute}:${second}Z`);
    } catch {
      return new Date();
    }
  }

  function updateClocks() {
    const container = document.getElementById('container');
    container.innerHTML = '';

    timezones.forEach(item => {
      const localTime = getTimeInTimezone(item.tz);
      const timeStr = formatTime(localTime, format24h);
      const dateStr = localTime.toLocaleDateString('fr-FR', { 
        year: 'numeric', 
        month: 'long', 
        day: 'numeric' 
      });
      const dayStr = localTime.toLocaleDateString('fr-FR', { weekday: 'long' });

      const card = document.createElement('div');
      card.className = 'clock-card';
      card.innerHTML = `
        <span class="emoji">${item.emoji}</span>
        <div class="city-name">${item.city}</div>
        <div class="timezone-info">${item.tz}</div>
        <div class="time-display">${timeStr}</div>
        <div class="date-display">${dateStr}</div>
        <div class="day-display">${dayStr}</div>
      `;
      container.appendChild(card);
    });
  }

  function setFormat(fmt) {
    format24h = fmt === '24h';
    document.querySelectorAll('.format-btn').forEach(btn => {
      btn.classList.toggle('active', (fmt === '24h' && btn.textContent === '24H') || (fmt === '12h' && btn.textContent === '12H'));
    });
    updateClocks();
  }

  function addTimezone() {
    const tz = prompt('Entrez le fuseau horaire (ex: Europe/Berlin):');
    const city = prompt('Entrez le nom de la ville:');
    const emoji = prompt('Entrez un emoji (optionnel):', '🌍');
    
    if (tz && city) {
      timezones.push({ city, tz, emoji: emoji || '🌍' });
      updateClocks();
    }
  }

  function resetTimezones() {
    location.reload();
  }

  createStars();
  updateClocks();
  setInterval(updateClocks, 1000);
</script>

</body>
</html>
